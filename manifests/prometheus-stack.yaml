---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/managed-by: kubectl
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: webapp
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app.kubernetes.io/name: webapp
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: webapp-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: webapp.rules
      interval: 30s
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{job="webapp",status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="webapp"}[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "High HTTP 5xx error rate on webapp"
            description: "Error rate is {{ printf \"%.2f\" $value | humanizePercentage }} — above the 5% threshold for more than 5 minutes."
            runbook: "https://github.com/gunasourav33/k8s-helm-monitoring/wiki/runbooks#high-error-rate"

        - alert: PodMemoryUsageHigh
          expr: |
            container_memory_working_set_bytes{namespace="default",container="webapp"}
            /
            container_spec_memory_limit_bytes{namespace="default",container="webapp"} > 0.85
          for: 10m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Webapp pod memory usage above 85%"
            description: "Pod {{ $labels.pod }} memory is at {{ printf \"%.0f\" $value | humanizePercentage }} of its limit."

        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="default",container="webapp"}[5m]) * 60 > 0.5
          for: 5m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Webapp pod is crash-looping"
            description: "Pod {{ $labels.pod }} has restarted {{ printf \"%.0f\" $value }} times per minute for the last 5 minutes."
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-webapp
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  webapp-dashboard.json: |
    {
      "title": "Webapp Overview",
      "uid": "webapp-overview-v1",
      "schemaVersion": 36,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Request Rate (req/s)",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"webapp\"}[2m])) by (status)",
              "legendFormat": "HTTP {{status}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 2,
          "type": "gauge",
          "title": "Error Rate",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"webapp\",status=~\"5..\"}[5m])) / sum(rate(http_requests_total{job=\"webapp\"}[5m]))",
              "legendFormat": "Error %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "steps": [
                  { "value": 0, "color": "green" },
                  { "value": 0.01, "color": "yellow" },
                  { "value": 0.05, "color": "red" }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Latency (p95 / p99)",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"webapp\"}[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"webapp\"}[5m])) by (le))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s" }
          }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Pod Memory Usage",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"default\",container=\"webapp\"}",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes" }
          }
        }
      ]
    }
